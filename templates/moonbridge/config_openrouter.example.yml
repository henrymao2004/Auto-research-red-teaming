# OpenRouter Anthropic ingress.
# Use RESEARCHER_BASE_URL=http://localhost:38442.
mode: "CaptureAnthropic"
log: { level: "info", format: "text" }
server: { addr: "0.0.0.0:38440" }
proxy:
  anthropic:
    base_url: "https://openrouter.ai/api/v1"
    api_key: "REPLACE_WITH_OPENROUTER_KEY"
    version: "2023-06-01"
