# Zoom bridge backend.
services:
  zoom-api:
    image: decodingtrustagent/zoom:api-latest
    restart: unless-stopped
    networks: [zoomnet]
    ports:
      - "8033:8033"
    environment:
      - ZOOM_JWT_SECRET=dev-secret
      - ZOOM_DB_PATH=/app/data/zoom.db
      - ZOOM_API_PORT=8033
    volumes:
      - zoom_data:/app/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8033/health', timeout=3).status < 400 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5

  zoom-ui:
    image: decodingtrustagent/zoom:ui-latest
    restart: unless-stopped
    networks: [zoomnet]
    depends_on:
      - zoom-api
    ports:
      - "8027:8027"
    environment:
      - ZOOM_API_URL=http://zoom-api:8033
      - ZOOM_UI_PORT=8027

networks:
  zoomnet:
    name: zoom_bridge_net

volumes:
  zoom_data:
