# Gmail bridge backend.
services:
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    networks: [gmailnet]
    ports:
      - "8025:8025"
      - "1025:1025"
    environment:
      MP_UI_BIND_ADDR: "0.0.0.0:8025"
      MP_SMTP_BIND_ADDR: "0.0.0.0:1025"

  user-service:
    image: decodingtrustagent/gmail:service-latest
    restart: unless-stopped
    networks: [gmailnet]
    security_opt:
      - seccomp:unconfined
    depends_on:
      - mailpit
    ports:
      - "8030:8030"
      - "8031:8031"
    volumes:
      - gmail_bridge_data:/app/data
    environment:
      - MAILPIT_BASE_URL=http://mailpit:8025
      - MAILPIT_SMTP_HOST=mailpit
      - MAILPIT_SMTP_PORT=1025
      - DATABASE_PATH=/app/data/users.db
      - ALLOWED_ORIGINS=*
      - AUTH_PORT=8030
      - PROXY_PORT=8031

  gmail-ui:
    image: decodingtrustagent/gmail:ui-latest
    restart: unless-stopped
    networks: [gmailnet]
    depends_on:
      - mailpit
      - user-service
    ports:
      - "8050:8050"
    environment:
      - MAILPIT_API_HOST=mailpit:8025
      - USER_SERVICE_URL=http://user-service:8030
      - API_PROXY_URL=http://user-service:8031
      - GMAIL_FRONTEND_PORT=8050

networks:
  gmailnet:
    name: gmail_bridge_net

volumes:
  gmail_bridge_data:
