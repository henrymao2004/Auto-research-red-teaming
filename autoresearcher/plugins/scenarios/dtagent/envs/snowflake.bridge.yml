# Snowflake bridge backend.
services:
  snowflake-pg:
    image: decodingtrustagent/snowflake:latest
    restart: unless-stopped
    networks: [snowflakenet]
    security_opt:
      - seccomp:unconfined
    ports:
      - "5454:5454"
    environment:
      POSTGRES_DB: snowdb
      POSTGRES_USER: snow
      POSTGRES_PASSWORD: snow
      PGPORT: "5454"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snow -d snowdb -p 5454"]
      interval: 5s
      timeout: 3s
      retries: 20

  snowflake-admin:
    image: decodingtrustagent/snowflake:admin
    restart: unless-stopped
    networks: [snowflakenet]
    security_opt:
      - seccomp:unconfined
    depends_on:
      snowflake-pg:
        condition: service_healthy
    ports:
      - "8454:8454"
    environment:
      SNOWFLAKE_PG_HOST: snowflake-pg
      SNOWFLAKE_PG_PORT: "5454"
      SNOWFLAKE_PG_DB: snowdb
      SNOWFLAKE_PG_USER: snow
      SNOWFLAKE_PG_PASSWORD: snow
      SNOWFLAKE_ADMIN_PORT: "8454"
      SNOWFLAKE_INIT_SQL_DIR: /init-sql
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('SNOWFLAKE_ADMIN_PORT','8454')+'/health', timeout=2)\" || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

networks:
  snowflakenet:
    name: snowflake_bridge_net
