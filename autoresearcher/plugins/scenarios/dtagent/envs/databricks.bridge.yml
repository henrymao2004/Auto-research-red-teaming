# Databricks bridge backend.
services:
  databricks-pg:
    image: decodingtrustagent/databricks:latest
    restart: unless-stopped
    networks: [databricksnet]
    security_opt:
      - seccomp:unconfined
    ports:
      - "5453:5453"
    environment:
      POSTGRES_DB: dbxdb
      POSTGRES_USER: dbx
      POSTGRES_PASSWORD: dbx
      PGPORT: "5453"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbx -d dbxdb -p 5453"]
      interval: 5s
      timeout: 3s
      retries: 20

  databricks-admin:
    image: decodingtrustagent/databricks:admin
    restart: unless-stopped
    networks: [databricksnet]
    security_opt:
      - seccomp:unconfined
    depends_on:
      databricks-pg:
        condition: service_healthy
    ports:
      - "8453:8453"
    environment:
      DATABRICKS_PG_HOST: databricks-pg
      DATABRICKS_PG_PORT: "5453"
      DATABRICKS_PG_DB: dbxdb
      DATABRICKS_PG_USER: dbx
      DATABRICKS_PG_PASSWORD: dbx
      DATABRICKS_ADMIN_PORT: "8453"
      DATABRICKS_INIT_SQL_DIR: /init-sql
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,os; urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('DATABRICKS_ADMIN_PORT','8453')+'/health', timeout=2)\" || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 30

networks:
  databricksnet:
    name: databricks_bridge_net
