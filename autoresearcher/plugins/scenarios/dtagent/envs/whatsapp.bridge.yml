# WhatsApp bridge backend.
services:
  whatsapp-pg:
    image: postgres:14
    restart: unless-stopped
    networks: [whatsappnet]
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_DB: whatsapp_sandbox
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      PGPORT: ${WHATSAPP_PG_PORT:-5473}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h whatsapp-pg -p ${WHATSAPP_PG_PORT:-5473} -U sandbox -d whatsapp_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  whatsapp-api:
    image: decodingtrustagent/whatsapp:api-latest
    restart: unless-stopped
    networks: [whatsappnet]
    security_opt:
      - seccomp:unconfined
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      whatsapp-pg:
        condition: service_healthy
    ports:
      - "${WHATSAPP_API_PORT:-8039}:${WHATSAPP_API_PORT:-8039}"
    environment:
      WHATSAPP_PG_HOST: whatsapp-pg
      WHATSAPP_PG_PORT: ${WHATSAPP_PG_PORT:-5473}
      WHATSAPP_PG_DB: whatsapp_sandbox
      WHATSAPP_PG_USER: sandbox
      WHATSAPP_PG_PASSWORD: sandbox
      WHATSAPP_API_PORT: ${WHATSAPP_API_PORT:-8039}
      DATABASE_URL: postgresql://sandbox:sandbox@whatsapp-pg:${WHATSAPP_PG_PORT:-5473}/whatsapp_sandbox
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:$${WHATSAPP_API_PORT:-8039}/health', timeout=5)\" || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 90s

  whatsapp-ui:
    image: decodingtrustagent/whatsapp:ui-latest
    restart: unless-stopped
    networks: [whatsappnet]
    depends_on:
      whatsapp-api:
        condition: service_healthy
    environment:
      WHATSAPP_FRONTEND_PORT: ${WHATSAPP_FRONTEND_PORT:-8040}
      WHATSAPP_API_URL: http://whatsapp-api:${WHATSAPP_API_PORT:-8039}

networks:
  whatsappnet:
    name: whatsapp_bridge_net
