name: claude_code
description: Anthropic Claude Code SDK running inside a Docker sandbox.
default_model: claude-haiku-4-5
victim: claude_code.adapter:ClaudeCodeAdapter
# Default image when a scenario contract doesn't override
# runtime.docker_image. Per-scenario images (ar_<scenario>:latest)
# layer on top of ar_claude_code_base:latest.
docker_image: ar_claude_code_base:latest
supports_attack_families:
  - multi_turn
  - multi_turn_user_prompt_ratchet
  - indirect_prompt_injection    # via PostToolUse hook + MCP tools registration
status: ready
